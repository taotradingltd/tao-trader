{% extends "data/table.html" %}

{% block head %}
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.8.16/jquery-ui.js"></script>
<link href="http://ajax.googleapis.com/ajax/libs/jqueryui/1.8.16/themes/ui-lightness/jquery-ui.css" rel="stylesheet"
  type="text/css" />
{% endblock %}

{% block title %}
 - Companies
{% endblock %}

{% block message %}
<h3>{{ message }}</h3>
{% endblock %}

{% block form %}
<input type="text" id="name" placeholder="Company" name="name" id="name">
<select id="firm_type" name="firm_type">
  <option value="" selected>Select firm type</option>
  {% for firm_type in firm_types %}
    <option value="{{ firm_type.pk }}">{{ firm_type.firm_type }}</option>
  {% endfor %}
</select>
<button type="submit">Apply filters</button>
<button type="button" onclick="window.location.href='/data/create_company/';">Create</button>
{% endblock %}

{% block script %}
<script type="text/javascript">
  window.onload = () => {
    var url = new URL(window.location.href);
    var name = url.searchParams.get("name");
    var firm_type = url.searchParams.get("firm_type");
    document.getElementById('name').value = name;
    document.getElementById('firm_type').value = firm_type;
  }
</script>
{% endblock %}
